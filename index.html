<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GeoTalk</title>
    <script type="importmap">
      {
        "imports": {
          "vue": "https://cdn.jsdelivr.net/npm/vue@3.5.32/dist/vue.esm-browser.js",
          "@graffiti-garden/implementation-decentralized": "https://cdn.jsdelivr.net/npm/@graffiti-garden/implementation-decentralized@0.0.9/dist/browser/index.js",
          "@graffiti-garden/wrapper-vue": "https://cdn.jsdelivr.net/npm/@graffiti-garden/wrapper-vue@1.2.2/dist/browser/plugin.mjs"
        }
      }
    </script>
    <script src="index.js" type="module"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app" class="app">Loading...</div>
    <template id="template">
      <main
        class="layout"
        :class="{
          'layout-auth': routeName === 'login',
          'layout-explore': routeName === 'explore'
        }"
      >
        <nav class="top-nav" v-if="$graffitiSession.value">
          <button class="nav-link" @click="goTo('/home')">Home</button>
          <button class="nav-link" @click="goTo('/explore')">Overview</button>
          <button class="auth-btn logout-btn" @click="$graffiti.logout($graffitiSession.value)">
            Log Out
          </button>
          <span class="app-brand">GeoTalk</span>
        </nav>

        <section class="route-login" v-if="routeName === 'login'">
          <h1>GeoTalk</h1>
          <p>Log in to start chatting and connect with your friends.</p>
          <button class="auth-btn" @click="$graffiti.login()">Log In</button>
        </section>

        <template v-else-if="$graffitiSession.value">
          <aside class="friends-panel" v-if="shouldShowFriends">
            <div class="current-location">
              <label for="current-location-select">Your location</label>
              <div class="current-location-controls">
                <select
                  id="current-location-select"
                  v-model="selectedCurrentLocation"
                  @change="saveCurrentLocation"
                  :disabled="isSavingLocation"
                >
                  <option v-for="location in currentLocationOptions" :key="location" :value="location">
                    {{ location }}
                  </option>
                </select>
                <span class="saving-location" v-if="isSavingLocation">Saving...</span>
              </div>
            </div>
            <form class="add-location-form" @submit.prevent="addLocationOption">
              <input
                type="text"
                v-model="newLocationName"
                placeholder="Add new location"
                required
              />
              <button
                type="submit"
                :disabled="isAddingLocation || !newLocationName.trim()"
              >
                {{ isAddingLocation ? "Adding..." : "Add Location" }}
              </button>
            </form>
            <p v-if="didAddLocation" class="form-success-popup">Location added successfully.</p>

            <form class="add-friend-form" @submit.prevent="createFriendChannel">
              <input
                type="text"
                v-model="newFriendActor"
                placeholder="Add new friend (friend ID)"
                required
              />
              <button
                type="submit"
                :disabled="isCreatingChannel || !newFriendActor.trim()"
              >
                {{ isCreatingChannel ? "Adding..." : "Add" }}
              </button>
            </form>
            <p v-if="didAddFriend" class="form-success-popup">Friend added successfully.</p>
            <p v-if="didFriendAlreadyAdded" class="form-info-popup">That friend is already added.</p>
            <h2 class="friends-by-location-title">Friends by Location</h2>

            <p v-if="areActionsLoading"><em>Loading channels...</em></p>
            <div v-else class="location-groups">
              <section
                class="location-group"
                v-for="group in visibleGroupedFriendChannels"
                :key="group.location"
                :class="{
                  'is-location-drop-target': locationDragOver === group.location,
                  'is-location-dragging': locationDragSource === group.location
                }"
                @dragover.prevent="onLocationGroupDragOver($event, group.location)"
                @drop.prevent="onLocationGroupDrop($event, group.location)"
              >
                <div class="location-group-header">
                  <span
                    class="location-drag-handle"
                    draggable="true"
                    @dragstart.stop="onLocationGroupDragStart($event, group.location)"
                    @dragend="onLocationGroupDragEnd"
                    title="Drag to reorder"
                    aria-label="Drag to reorder locations"
                  ></span>
                  <div class="location-toggle-btn" role="group" :aria-label="group.location + ' location row'">
                    <button
                      class="location-toggle-main"
                      type="button"
                      :title="group.location"
                      @click="toggleLocationGroup(group.location)"
                      :aria-expanded="!isLocationCollapsed(group.location)"
                    >
                      <span class="location-toggle-icon">{{ isLocationCollapsed(group.location) ? "▸" : "▾" }}</span>
                      <span class="location-toggle-label">{{ group.location }}</span>
                    </button>
                    <div class="location-toggle-actions">
                      <button
                        class="location-hide-btn"
                        type="button"
                        @click="hideLocation(group.location)"
                        title="Hide this location from the list (you can show it again below)"
                      >
                        Hide
                      </button>
                      <button
                        class="location-channel-btn"
                        type="button"
                        @click="joinLocationChannel(group.location)"
                      >
                        Open channel
                      </button>
                    </div>
                  </div>
                </div>
                <transition-group
                  v-if="!isLocationCollapsed(group.location) && group.hasChannels"
                  name="friend-remove"
                  tag="div"
                  class="friend-grid"
                >
                  <article
                    class="friend-card-wrap"
                    v-for="chat in group.channels"
                    :key="chat.chatId"
                  >
                    <button
                      class="friend-card friend-open-btn"
                      @click="joinChat(chat)"
                      :disabled="isJoiningChat"
                    >
                      <span class="avatar">◯</span>
                      <span class="friend-name">
                        <graffiti-actor-to-handle :actor="chat.otherActor" v-slot="{ handle }">
                          {{ formatUsername(handle || chat.otherActor) }}
                        </graffiti-actor-to-handle>
                      </span>
                      <span class="friend-location">{{ chat.chatLocation }}</span>
                    </button>
                    <button
                      class="friend-remove-btn"
                      type="button"
                      @click="deleteFriendChannel(chat)"
                      :disabled="isDeletingChat(chat.chatId)"
                    >
                      {{ isDeletingChat(chat.chatId) ? "Removing..." : "Remove" }}
                    </button>
                  </article>
                </transition-group>
                <p
                  v-else-if="!isLocationCollapsed(group.location) && !group.hasChannels"
                  class="location-no-friends-msg"
                >
                  No friends currently in this location
                </p>
              </section>

              <div v-if="hiddenGroupedFriendChannels.length" class="hidden-locations-panel">
                <button
                  type="button"
                  class="hidden-locations-summary"
                  @click="toggleHiddenLocationsPanel"
                  :aria-expanded="hiddenLocationsExpanded"
                >
                  <span class="hidden-locations-chevron">{{ hiddenLocationsExpanded ? '▾' : '▸' }}</span>
                  <span class="hidden-locations-title">
                    {{ hiddenGroupedFriendChannels.length }} hidden location<span v-if="hiddenGroupedFriendChannels.length !== 1">s</span>
                  </span>
                </button>
                <div v-show="hiddenLocationsExpanded" class="hidden-locations-body">
                  <p class="hidden-locations-lead">
                    These stay out of your main list. Open a location channel or bring a location back when you need it.
                  </p>
                  <div
                    class="hidden-location-row"
                    v-for="group in hiddenGroupedFriendChannels"
                    :key="'hidden-loc-' + group.location"
                  >
                    <div class="hidden-location-info">
                      <span class="hidden-location-name" :title="group.location">{{ group.location }}</span>
                      <span v-if="group.hasChannels" class="hidden-location-meta">
                        {{ group.channels.length }} friend<span v-if="group.channels.length !== 1">s</span>
                      </span>
                    </div>
                    <button
                      type="button"
                      class="location-unhide-btn"
                      @click="unhideLocation(group.location)"
                    >
                      Show
                    </button>
                    <button
                      type="button"
                      class="location-channel-btn location-channel-btn-compact"
                      @click="joinLocationChannel(group.location)"
                    >
                      Open channel
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </aside>

          <section class="chat-panel" v-if="showChatPanel">
            <template v-if="activeChatId">
              <header class="chat-header">
                <div>
                  <h2 v-if="activeChatType === 'direct'">
                    <graffiti-actor-to-handle :actor="activeOtherActor" v-slot="{ handle }">
                      {{ formatUsername(handle || activeOtherActor) }}
                    </graffiti-actor-to-handle>
                  </h2>
                  <h2 v-else :title="activeChatLocation">{{ activeChatLocation }} channel</h2>
                  <p v-if="activeChatType === 'direct'" class="chat-actor-id">{{ activeOtherActor }}</p>
                  <p v-if="activeChatType === 'direct'">{{ activeOtherLocation }}</p>
                  <p v-else class="chat-actor-id">Open channel for anyone in this location</p>
                </div>
                <button class="close-chat" @click="closeActiveChat">X</button>
              </header>

              <ul class="messages">
                <li
                  v-for="message in activeChatMessages"
                  :key="message.url"
                  :class="[
                    'message-row',
                    message.actor === $graffitiSession.value?.actor ? 'mine' : 'theirs'
                  ]"
                >
                  <div class="message-bubble">
                    <p
                      :class="[
                        'message-text',
                        { 'message-loved': isMessageLoved(message) }
                      ]"
                    >
                      {{ message.value.content }}
                    </p>
                    <love-button
                      v-if="message.actor !== $graffitiSession.value?.actor"
                      :count="getLoveCount(message.url)"
                      :can-love="canLoveMessage(message)"
                      :loved-by-me="didLoveMessage(message.url)"
                      :is-loading="isLovingMessage(message.url)"
                      @love="loveMessage(message)"
                    ></love-button>
                    <span
                      v-else-if="getLoveCount(message.url) > 0"
                      class="love-count-pill"
                    >
                      ❤ {{ getLoveCount(message.url) }}
                    </span>
                  </div>
                </li>
              </ul>

              <form class="composer" @submit.prevent="sendMessage">
                <input
                  type="text"
                  v-model="draftMessage"
                  placeholder="Type a message"
                  required
                />
                <button
                  type="submit"
                  class="send-btn"
                  :disabled="isSendingMessage || !draftMessage.trim()"
                >
                  {{ isSendingMessage ? "..." : "↑" }}
                </button>
              </form>
            </template>
            <p v-else class="empty-chat">
              This chat route is valid, but the channel details are still loading.
            </p>
          </section>

          <section class="explore-panel" v-else-if="routeName === 'explore'">
            <h2>Explore GeoTalk</h2>
            <p class="explore-lead">
              GeoTalk helps you stay in touch with friends by organizing chats around where people are.
            </p>
            <section class="explore-guide">
              <h3>How to use the app</h3>
              <ol>
                <li>Go to Home and set your current location.</li>
                <li>Add friends using their friend ID to create a chat channel. You will then be able to see what location your friends currently are in.</li>
                <li>Click on a friend to chat, send messages, and react with Love.</li>
                <li>Each location also has an "Open channel" button to allow for chatting within that location anonymously.</li>
                <li>Use Explore anytime to check your overall activity.</li>
              </ol>
            </section>
            <section class="explore-stats">
              <h3>Your current stats</h3>
              <p>Friends: {{ friendCount }}</p>
              <p>Total messages: {{ totalMessageCount }}</p>
            </section>
            <div class="actor-card explore-actor-card">
              <p class="actor-label">Your friend ID</p>
              <p class="actor-value">{{ $graffitiSession.value?.actor }}</p>
              <button type="button" class="copy-actor-btn" @click="copyMyActorId">
                {{ didCopyActorId ? "Copied!" : "Copy friend ID" }}
              </button>
            </div>
          </section>

          <section class="chat-panel" v-else>
            <p class="empty-chat">Select a friend channel to start chatting.</p>
          </section>
        </template>
        <section class="route-login" v-else>
          <p>Loading session...</p>
        </section>
      </main>
    </template>
  </body>
</html>
